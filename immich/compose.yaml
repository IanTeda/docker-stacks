
# Immich Docker Compose File
#
# Immich is a self-hosted photo and video backup solution with powerful search and organization features.
#
# Official documentation: https://immich.app/docs/
# Latest compose reference: https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# Usage:
#   docker compose -f immich/compose.yaml up -d --force-recreate
#
# For hardware acceleration, see hwaccel.transcoding.yml and hwaccel.ml.yml in this directory.
#
# If deploying with Dockhand or similar tools, ensure all referenced files and environment variables are available in your deployment context.
#

name: ${COMPOSE_PROJECT_NAME:-immich}

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-immich}-network
    driver: bridge
  traefik-network:
    external: true

services:
  
  database:
    container_name: ${COMPOSE_PROJECT_NAME:-immich}-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:? "Environment variable DB_PASSWORD must be set"}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of IMMICH_DATA_PATH in the .env file
      - ${IMMICH_DATA_PATH:-./.volumes}/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      disable: false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  redis:
    container_name: ${COMPOSE_PROJECT_NAME:-immich}-redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    restart: unless-stopped
    volumes:
      - ${IMMICH_DATA_PATH:-./.volumes}/redis:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  immich-server:
    container_name: ${COMPOSE_PROJECT_NAME:-immich}-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    restart: unless-stopped
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: nvenc # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of PHOTOS_PATH in the .env file
      - ${PHOTOS_PATH:-./.volumes/photos}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    networks:
      - default
      - traefik-network
    ports:
      - '2283:2283'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      disable: false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # Enable Watchtower updates for the server container if WATCHTOWER_UPDATE_ENABLE is set to true in the .env file
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER_UPDATE_ENABLE:-false}"

      # Traefik proxy configuration - only apply if TRAEFIK_ENABLED is set to true in the .env file
      - "traefik.enable=${TRAEFIK_ENABLE}"
      - "traefik.http.routers.immich.rule=Host(`${TRAEFIK_IMMICH_DOMAIN:-immich.local}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
      - "traefik.http.routers.immich.priority=50"
      - "traefik.docker.network=traefik-network"

  immich-machine-learning:
    container_name: ${COMPOSE_PROJECT_NAME:-immich}-machine-learning
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ${IMMICH_DATA_PATH:-./.volumes}/model-cache:/usr/src/app/model-cache
      - /etc/localtime:/etc/localtime:ro
    restart: always
    healthcheck:
      disable: false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"